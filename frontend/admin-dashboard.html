<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - VTernship</title>

    <link rel="stylesheet" href="css/styles.css" />

    <style>
      /* ========== GLOBAL IMPROVEMENTS ========== */
      * {
        box-sizing: border-box;
      }

      body {
        background: #f8fafc;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }

      .dashboard {
        padding: 120px 0 60px;
        min-height: calc(100vh - 200px);
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: 3fr 1fr;
        gap: 24px;
      }

      @media (max-width: 1024px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ========== HEADER CARD ========== */
      .header-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: rgb(255, 255, 255);
        padding: 2.5rem;
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        margin-bottom: 24px;
      }

      .header-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: url('/assets/images/admin_hero.png') center/cover no-repeat;
        opacity: 0.15;
      }

      .header-card::after {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
        border-radius: 50%;
      }

      .header-card > * {
        position: relative;
        z-index: 1;
      }

      .header-card h2 {
        font-size: 2rem;
        font-weight: 700;
        margin: 0 0 0.5rem 0;
        letter-spacing: -0.5px;
      }

      .header-card p {
        margin: 0;
        font-size: 1.05rem;
        color: #ffffff;
        opacity: 1;
      }

      .avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        border: 3px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.75rem;
        font-weight: 700;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      /* ========== STATS CARDS ========== */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);

        gap: 20px;
        margin-bottom: 28px;
      }

      .stat-card {
        background: white;
        padding: 1.75rem;
        border-radius: 14px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.03);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        transform: scaleX(0);
        transition: transform 0.3s ease;
      }

      .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }

      .stat-card:hover::before {
        transform: scaleX(1);
      }

      .stat-number {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 800;
        margin-bottom: 0.5rem;
        line-height: 1;
      }

      .stat-card > :last-child {
        color: #334155;
        font-size: 2.1rem;
        font-weight: 600;
        letter-spacing: 0.4px;
      }

      /* ========== TABLE BOX ========== */
      .table-box {
        background: white;
        padding: 28px;
        border-radius: 16px;
        margin-bottom: 28px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.03);
        transition: box-shadow 0.3s ease;
      }

      .table-box:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      }

      /* ========== HEADER ROW ========== */
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 2px solid #f1f5f9;
      }

      .header-row h3 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 700;
        color: #1e293b;
        letter-spacing: -0.3px;
      }

      .header-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .header-actions input,
      .header-actions select {
        padding: 10px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 0.9rem;
        transition: all 0.2s ease;
        background: white;
        color: #334155;
        min-width: 180px;
      }

      .header-actions input:focus,
      .header-actions select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .header-actions input::placeholder {
        color: #94a3b8;
      }

      /* ========== TABLES ========== */
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
      }

      thead th {
        background: #f8fafc;
        font-weight: 700;
        color: #475569;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.8px;
        padding: 14px 16px;
        border-bottom: 2px solid #e2e8f0;
        text-align: left;
      }

      thead th:first-child {
        border-top-left-radius: 10px;
      }

      thead th:last-child {
        border-top-right-radius: 10px;
      }

      tbody td {
        padding: 16px;
        border-bottom: 1px solid #f1f5f9;
        color: #334155;
        font-size: 0.95rem;
      }

      tbody tr {
        transition: all 0.2s ease;
      }

      tbody tr:hover {
        background: #f8fafc;
        transform: scale(1.001);
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:last-child td:first-child {
        border-bottom-left-radius: 10px;
      }

      tbody tr:last-child td:last-child {
        border-bottom-right-radius: 10px;
      }

      td a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      td a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      /* ========== BUTTONS ========== */
      .view-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
      }

      .view-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
      }

      .view-btn:active {
        transform: translateY(0);
      }

      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .approve {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        box-shadow: 0 2px 6px rgba(16, 185, 129, 0.25);
      }

      .approve:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
      }

      .reject {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: white;
        box-shadow: 0 2px 6px rgba(245, 158, 11, 0.25);
      }

      .reject:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(245, 158, 11, 0.35);
      }

      /* ========== STATUS BADGES ========== */
      .status {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        display: inline-block;
      }

      .ok {
        background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
        color: #065f46;
        border: 1.5px solid #6ee7b7;
      }

      .pending {
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        color: #92400e;
        border: 1.5px solid #fcd34d;
      }

      /* ========== SIDEBAR ========== */
      .sidebar-card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.03);
        position: sticky;
        top: 140px;
      }

      .sidebar-card h3 {
        margin: 0 0 20px 0;
        font-size: 1.25rem;
        font-weight: 700;
        color: #1e293b;
        padding-bottom: 12px;
        border-bottom: 2px solid #f1f5f9;
      }

      .activity {
        font-size: 0.9rem;
        margin-bottom: 16px;
        padding: 14px;
        background: #f8fafc;
        border-radius: 10px;
        color: #475569;
        border-left: 3px solid #667eea;
        transition: all 0.2s ease;
      }

      .activity:hover {
        background: #f1f5f9;
        transform: translateX(4px);
      }

      .activity:last-child {
        margin-bottom: 0;
      }

      .activity small {
        color: #94a3b8;
        font-size: 0.8rem;
        font-weight: 500;
      }

      /* ========== RESPONSIVE IMPROVEMENTS ========== */
      @media (max-width: 768px) {
        .dashboard {
          padding: 100px 0 40px;
        }

        .header-card {
          flex-direction: column;
          text-align: center;
          gap: 20px;
          padding: 2rem;
        }

        .header-card h2 {
          font-size: 1.5rem;
        }

        .stats {
          grid-template-columns: repeat(2, 1fr);
          gap: 15px;
        }

        .stat-number {
          font-size: 3.2rem;
          font-weight: 800;
          margin-bottom: 8px;
          letter-spacing: -1px;
        }

        .header-row {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }

        .header-actions {
          width: 100%;
          flex-direction: column;
        }

        .header-actions input,
        .header-actions select,
        .view-btn {
          width: 100%;
        }

        .table-box {
          padding: 20px;
          overflow-x: auto;
        }

        table {
          min-width: 600px;
        }

        .sidebar-card {
          position: static;
        }
      }

      @media (max-width: 480px) {
        .stats {
          grid-template-columns: 1fr;
        }

        .avatar {
          width: 60px;
          height: 60px;
          font-size: 1.25rem;
        }
      }

      /* ========== LOADING STATE ========== */
      #adminContent:empty::after {
        content: 'Loading dashboard...';
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 400px;
        font-size: 1.2rem;
        color: #94a3b8;
      }

      /* ========== SCROLLBAR STYLING ========== */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="container nav-container">
        <div class="logo" onclick="location.href = 'index.html'">
          <span class="logo-icon">V</span> <span class="logo-text">Ternship</span>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="how-it-works.html">How It Works</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <div id="navAuth"></div>
      </div>
    </nav>

    <section class="dashboard">
      <div class="container">
        <div id="adminContent"></div>
      </div>
    </section>

  <footer class="footer">
<div class="container">
<div class="footer-bottom">
<p>© 2026 VTernship</p>
</div>
</div>
</footer>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const role = localStorage.getItem('vternship_role')
        const user = JSON.parse(localStorage.getItem('vternship_user'))

        if (role !== 'admin') {
          location.href = 'auth/signin.html'
          return
        }
        loadDashboard(user)
      })

      async function loadDashboard(user) {
        const sRes = await fetch('/api/admin/students', { credentials: 'include' })
        const cRes = await fetch('/api/admin/companies', { credentials: 'include' })

        const students = (await sRes.json()).students || []
        const companies = (await cRes.json()).companies || []

        window.allStudents = students
        window.allCompanies = companies

        const approvedCount = companies.filter((c) => c.approved === 'true').length
        const notApprovedCount = companies.filter((c) => c.approved !== 'true').length
        document.getElementById('adminContent').innerHTML = `
<div class="dashboard-grid">

<div>

<div class="header-card">
<div>
<h2>${user.name.split(' ')[0]}, Admin Dashboard</h2>
<p>Manage platform data</p>
</div>
<div class="avatar">
${user.name
  .split(' ')
  .map((n) => n[0])
  .join('')}
</div>
</div>

<div class="stats">
<div class="stat-card">
<div class="stat-number">${students.length}</div>
Students
</div>

<div class="stat-card">
<div class="stat-number">${companies.length}</div>
Companies
</div>

<div class="stat-card">
<div class="stat-number">${approvedCount}</div>
Approved
</div>
<div class="stat-card">
<div class="stat-number">${notApprovedCount}</div>
Not Approved
</div>
</div>

<div class="table-box">
<div class="header-row">
<h3>Latest Students</h3>

<div class="header-actions">
<input id="studentSearch" placeholder="Search students" onkeyup="filterStudents()">
<button class="view-btn" onclick="downloadStudentsCSV()">CSV</button>
<button class="view-btn" onclick="downloadStudentsPDF()">PDF</button>

<button class="view-btn"
onclick="location.href='view-all-students.html'">
View All
</button>
</div>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Verified</th>
<th>Skills</th>
</tr>
</thead>

<tbody id="studentTableBody"></tbody>
</table>
</div>

<div class="table-box">
<div class="header-row">
<h3>Companies</h3>

<div class="header-actions">
<input id="companySearch" placeholder="Search companies" onkeyup="filterCompanies()">

<select id="companyFilter" onchange="filterCompanies()">
<option value="all">All</option>
<option value="true">Approved</option>
<option value="false">Not Approved</option>
</select>

<button class="view-btn" onclick="downloadCompaniesCSV()">CSV</button>
<button class="view-btn" onclick="downloadCompaniesPDF()">PDF</button>

<button class="view-btn"
onclick="location.href='view-all-companies.html'">
View All
</button>
</div>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Website</th>
<th>Verified</th>
<th>Approved</th>
<th>Action</th>
</tr>
</thead>

<tbody id="companyTableBody"></tbody>
</table>
</div>

</div>

<div>
<div class="sidebar-card">
<h3>Activity Feed</h3>
<div id="activityFeed">Loading...</div>
</div>
</div>

</div>
`

        renderStudents(students)
        renderCompanies(companies)
        loadActivity()
      }

      function renderStudents(list) {
        document.getElementById('studentTableBody').innerHTML = list
          .slice(0, 5)
          .map(
            (s) => `
<tr>
<td>${s.first_name} ${s.last_name}</td>
<td>${s.email}</td>
<td>${s.verified}</td>
<td>${s.skills || '-'}</td>
</tr>`,
          )
          .join('')
      }

      function renderCompanies(list) {
        document.getElementById('companyTableBody').innerHTML = list
          .slice(0, 5)
          .map(
            (c) => `
<tr>
<td>${c.company_name}</td>
<td>${c.email}</td>
<td><a href="${c.website}" target="_blank">Visit</a></td>

<td><span class="status ${c.verified === 'true' ? 'ok' : 'pending'}">${c.verified}</span></td>

<td><span class="status ${c.approved === 'true' ? 'ok' : 'pending'}">${c.approved}</span></td>

<td>
${
  c.approved === 'true'
    ? `<button class="btn reject" onclick="updateStatus('${c.id}','false')">Unapprove</button>`
    : `<button class="btn approve" onclick="updateStatus('${c.id}','true')">Approve</button>`
}
</td>
</tr>`,
          )
          .join('')
      }

      function filterStudents() {
        const q = document.getElementById('studentSearch').value.toLowerCase()

        renderStudents(
          window.allStudents.filter(
            (s) =>
              s.first_name.toLowerCase().includes(q) ||
              s.last_name.toLowerCase().includes(q) ||
              s.email.toLowerCase().includes(q),
          ),
        )
      }

      function filterCompanies() {
        const q = document.getElementById('companySearch').value.toLowerCase()
        const status = document.getElementById('companyFilter').value

        let rows = window.allCompanies.filter(
          (c) => c.company_name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q),
        )

        if (status !== 'all') {
          rows = rows.filter((c) => c.approved === status)
        }

        renderCompanies(rows)
      }

      async function updateStatus(id, value) {
        await fetch('/api/admin/update-company-status', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            company_id: id,
            field: 'approved',
            value: value,
          }),
        })
        location.reload()
      }

      function downloadStudentsCSV() {
        window.location = '/api/admin/download/students'
      }
      function downloadCompaniesCSV() {
        window.location = '/api/admin/download/companies'
      }
      function downloadStudentsPDF() {
        window.location = '/api/admin/students/pdf'
      }
      function downloadCompaniesPDF() {
        window.location = '/api/admin/companies/pdf'
      }

      async function loadActivity() {
        const res = await fetch('/api/admin/activity', { credentials: 'include' })
        const data = await res.json()

        document.getElementById('activityFeed').innerHTML = data.activity
          .map(
            (a) => `
<div class="activity">
${a.message}<br>
<small>${new Date(a.created_at).toLocaleString()}</small>
</div>`,
          )
          .join('')
      }
    </script>
    <script src="js/auth.js"></script>
    <script src="/js/script.js"></script>
  </body>
</html>

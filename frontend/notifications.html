.header-row button{

}

.notification-item.unread{

}

.notification-time{
font-size:12px;
color:#777;

}

.notification-actions button{
border:none;
padding:6px 10px;
margin-left:6px;
border-radius:6px;
cursor:pointer;
}

.read-btn{background:#10b981;color:white;}
.delete-btn{background:#ef4444;color:white;}

padding:40px;

}

<div class="company-main">
<div class="container">

<div class="header-row">
<h2>Notifications</h2>
<div>
<button onclick="markAllRead()">Mark All Read</button>
<button onclick="clearAll()">Clear All</button>
</div>
</div>

<div class="notification-box" id="notificationList"></div>

</div>

<div class="container">
<p style="text-align:center">© 2026 VTernship</p>
</div>
</footer>

<script>
let notifications=[];
let internships=[];
let applications=[];

document.addEventListener("DOMContentLoaded", async ()=>{
const session = await fetch("/api/auth/check-session",{credentials:"include"});
const user = await session.json();

if(!user.authenticated || user.role!=="company"){
location.href="auth/signin.html";
return;
}

await loadData();
});

/* Load data */
async function loadData(){
const iRes = await fetch("/api/company/internships",{credentials:"include"});
internships = (await iRes.json()).internships || [];

const aRes = await fetch("/api/company/applications",{credentials:"include"});
applications = (await aRes.json()).applications || [];

generateNotifications();
renderNotifications();
}

/* Generate notifications from applications */
function generateNotifications(){

notifications = applications.map(a=>{
const internship = internships.find(
i=>i.internship_id===a.internship_id
);

return {
id:a.application_id,
text:`${a.student_name} applied for "${internship ? internship.title : "an internship"}"`,
time:a.applied_at,
read:false
};
})
.sort((a,b)=>new Date(b.time)-new Date(a.time));
}

/* Render */
function renderNotifications(){
const container=document.getElementById("notificationList");

if(notifications.length===0){
container.innerHTML=`<div class="empty">No notifications available.</div>`;
return;
}

container.innerHTML = notifications.map((n,i)=>`
<div class="notification-item ${n.read?"":"unread"}">
<div>
<div>${n.text}</div>
<div class="notification-time">
${new Date(n.time).toLocaleString()}
</div>
</div>

<div class="notification-actions">
${!n.read?`
<button class="read-btn" onclick="markRead(${i})">
Mark Read
</button>`:""}

<button class="delete-btn" onclick="deleteNotification(${i})">
Delete
</button>
</div>
</div>
`).join("");
}

/* Actions */
function markRead(i){
notifications[i].read=true;
renderNotifications();
}

function deleteNotification(i){
notifications.splice(i,1);
renderNotifications();
}

function markAllRead(){
notifications.forEach(n=>n.read=true);
renderNotifications();
}

function clearAll(){
if(confirm("Clear all notifications?")){
notifications=[];
renderNotifications();
}
}
</script>

</body>
</html>

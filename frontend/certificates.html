<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificates - VTernship</title>

<link rel="stylesheet" href="css/styles.css">

<style>
.dashboard {
  padding:120px 0 60px;
  background:#f8fafc;
}

.dashboard-wrapper {
  display:flex;
}

/* Sidebar */
.company-sidebar {
  width:250px;
  background:linear-gradient(180deg,#6366f1,#8b5cf6);
  color:white;
  min-height:calc(100vh - 120px);
  padding:20px;
}

.company-sidebar h3 { margin-bottom:20px; }

.company-sidebar a {
  display:block;
  color:rgba(255,255,255,0.9);
  padding:12px;
  border-radius:8px;
  text-decoration:none;
  margin-bottom:6px;
}

.company-sidebar a:hover,
.company-sidebar a.active {
  background:rgba(255,255,255,0.2);
}

/* Main */
.company-main {
  flex:1;
  padding:0 30px;
}

.table-box {
  background:white;
  padding:24px;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.header-row {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.header-row input {
  padding:10px;
  border-radius:6px;
  border:1px solid #ddd;
  width:250px;
}

.view-btn {
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:14px;
  border-bottom:1px solid #eee;
}

th {
  background:#f3f4f6;
}

.action-btn {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.download-btn {
  background:#10b981;
  color:white;
}

.delete-btn {
  background:#ef4444;
  color:white;
}

/* Modal */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:24px;
  border-radius:12px;
  width:500px;
  max-width:95%;
}

.modal input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="container nav-container">
<div class="logo" onclick="location.href='index.html'">
<span class="logo-icon">V</span>
<span class="logo-text">Ternship</span>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="how-it-works.html">How It Works</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<div id="navAuth"></div>
</div>
</nav>

<section class="dashboard">
<div class="dashboard-wrapper">

<!-- Sidebar -->
<div class="company-sidebar">
<h3>VTernship</h3>

<a href="company-dashboard.html">Dashboard</a>
<a href="manage-internships.html">Manage Internships</a>
<a href="review-applicants.html">Review Applicants</a>
<a href="performance-analytics.html">Performance Analytics</a>
<a class="active">Certificates</a>
<a href="notifications.html">Notifications</a>
<a href="company-profile.html">Company Profile</a>
<a href="help-center.html">Help Center</a>
</div>

<!-- Main -->
<div class="company-main">
<div class="container">

<div class="header-row">
<h2>Certificates</h2>

<div>
<input placeholder="Search intern..." onkeyup="searchCertificates(this.value)">
<button class="view-btn" onclick="openModal()">Issue Certificate</button>
</div>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>Intern Name</th>
<th>Internship</th>
<th>Date Issued</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="certificateTable"></tbody>
</table>
</div>

</div>
</div>

</div>
</section>

<!-- Modal -->
<div class="modal" id="certModal">
<div class="modal-content">
<h3>Issue Certificate</h3>

<input id="internName" placeholder="Intern Name">
<input id="internshipTitle" placeholder="Internship Title">

<button class="view-btn" onclick="saveCertificate()">Issue</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<footer class="footer">
<div class="container">
<p style="text-align:center">© 2026 VTernship</p>
</div>
</footer>

<script>
let certificates =
  JSON.parse(localStorage.getItem("company_certificates")) || [];

const table = document.getElementById("certificateTable");

function saveStorage(){
  localStorage.setItem("company_certificates",
    JSON.stringify(certificates));
}

function renderTable(list = certificates){
  table.innerHTML = list.map((c, i)=>`
<tr>
<td>${c.name}</td>
<td>${c.internship}</td>
<td>${c.date}</td>
<td>
<button class="action-btn download-btn"
onclick="downloadCert(${i})">Download</button>

<button class="action-btn delete-btn"
onclick="deleteCert(${i})">Delete</button>
</td>
</tr>
`).join("");

saveStorage();
}

function openModal(){
  document.getElementById("certModal").style.display="flex";
}

function closeModal(){
  document.getElementById("certModal").style.display="none";
}

function saveCertificate(){
  if(!internName.value || !internshipTitle.value){
    alert("Fill all fields");
    return;
  }

  certificates.push({
    name:internName.value,
    internship:internshipTitle.value,
    date:new Date().toLocaleDateString()
  });

  internName.value="";
  internshipTitle.value="";

  renderTable();
  closeModal();
}

function deleteCert(i){
  if(confirm("Delete certificate?")){
    certificates.splice(i,1);
    renderTable();
  }
}

function downloadCert(i){
  alert("Certificate download feature can connect to PDF generator later.");
}

function searchCertificates(q){
  q = q.toLowerCase();

  renderTable(
    certificates.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.internship.toLowerCase().includes(q)
    )
  );
}

function logout(){
  localStorage.clear();
  location.href="auth/signin.html";
}

renderTable();
</script>

<script src="js/auth.js"></script>

</body>
</html>

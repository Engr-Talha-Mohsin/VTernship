<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Applications - VTernship</title>

<link rel="stylesheet" href="css/styles.css">
<script src="js/auth.js"></script>

<style>
.dashboard{padding:120px 0 60px;background:#f8fafc}
.dashboard-wrapper{display:flex}

/* Sidebar */
.sidebar{
width:240px;background:#fff;
min-height:calc(100vh - 120px);
padding:20px;border-right:1px solid #eee;
position:sticky;top:120px;
}

.sidebar a{
display:block;color:#333;
padding:10px 0;text-decoration:none;
}

.sidebar a:hover,
.sidebar a.active{
color:#6366f1;
font-weight:600;
}

.dashboard-main{flex:1;padding:0 30px}

/* Cards */
.card{
background:white;
padding:2rem;
border-radius:12px;
margin-bottom:2rem;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.app-card{
border:1px solid #eee;
padding:20px;
border-radius:10px;
margin-bottom:15px;
}

.status{font-weight:bold}
.status.pending{color:#f59e0b}
.status.accepted{color:#22c55e}
.status.rejected{color:#ef4444}
</style>
</head>

<body>

<nav class="navbar">
<div class="container nav-container">
<div class="logo" onclick="location.href='index.html'">
<span class="logo-icon">V</span>
<span class="logo-text">Ternship</span>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="how-it-works.html">How It Works</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<div id="navAuth"></div>
</div>
</nav>

<section class="dashboard">
<div class="dashboard-wrapper">

<div class="sidebar">
<h3>MAIN</h3>
<a href="student-dashboard.html">Dashboard</a>
<a href="internships.html">Internships</a>
<a class="active">My Applications</a>
<a href="tasks.html">Tasks</a>
<a href="certificates.html">Certificates</a>
<a href="notifications.html">Notifications</a>
<a href="help-center.html">Help Center</a>
</div>

<div class="dashboard-main">
<div class="container">

<div class="card">
<h2>My Internship Applications</h2>
<div id="applicationsList"></div>
</div>

</div>
</div>

</div>
</section>

<footer class="footer">
<div class="container">
<p style="text-align:center;">© 2026 VTernship</p>
</div>
</footer>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const sessionRes = await fetch("/api/auth/check-session",
    {credentials:"include"});
const sessionData = await sessionRes.json();

if(!sessionData.authenticated || sessionData.role!=="student"){
location.href="auth/signin.html";
return;
}

loadApplications();
});

async function loadApplications(){

const res = await fetch("/api/student/applications",
    {credentials:"include"});
const apps = await res.json();

const acceptedRes = await fetch(
    "/api/student/accepted-internships",
    {credentials:"include"}
);

const acceptedData = await acceptedRes.json();
const acceptedList = acceptedData.internships || [];

renderApplications(apps, acceptedList);
}

function renderApplications(apps, acceptedList){

const box = document.getElementById("applicationsList");
box.innerHTML = "";

if(!apps.length){
box.innerHTML = "<p>No applications submitted yet.</p>";
return;
}

apps.forEach(a => {

const acceptedRecord = acceptedList.find(
    x => x.application_id === a.application_id
);

/* IMPORTANT FIX */
const showAccepted =
    a.status === "accepted" && acceptedRecord;

box.innerHTML += `
<div class="app-card">

<h3>${acceptedRecord ? acceptedRecord.title : "Internship"}</h3>

<p><b>Email:</b> ${a.email}</p>
<p><b>Skills:</b> ${a.skills}</p>
<p><b>Applied:</b> ${
    new Date(a.applied_at).toLocaleDateString()
}</p>

<p><b>Status:</b>
<span class="status ${a.status}">
${a.status}
</span>
</p>

<p><b>Cover Letter:</b><br>
${a.cover_letter}
</p>

${showAccepted ? `
<p style="color:#22c55e;font-weight:bold;">
✔ Accepted Internship Active
</p>` : ""}

</div>`;
});
}
</script>

</body>
</html>
